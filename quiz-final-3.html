<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پرسشنامه تشخیص نوع پوست</title>
<style>
body { font-family: Tahoma, sans-serif; direction: rtl; padding: 20px; background: linear-gradient(180deg,#eefaf5 0%, #ffffff 100%); }
.container { max-width: 700px; margin: 30px auto; background: #fff; padding: 28px; border-radius: 18px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
header { text-align: center; margin-bottom: 10px; }
h2 { color: #1b7a59; margin: 6px 0; font-size: 1.8rem; }
.intro { color: #333; line-height: 1.7; }
.form-row label { display:block; margin:12px 0; }
input[type="text"], input[type="number"], select { width:100%; padding:12px; border-radius:10px; border:1px solid #d7eae2; }
button { background:#1b7a59; color:#fff; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-size:1rem; box-shadow: 0 6px 18px rgba(27,122,89,0.12); transition: transform .12s ease, box-shadow .12s ease; }
button:hover { background:#166645; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(22,102,69,0.15); }
.question { margin-top:18px; background:linear-gradient(180deg,#fbfffd,#f2fbf7); padding:18px; border-radius:12px; box-shadow: 0 6px 18px rgba(27,122,89,0.06); }
.question h3 { margin:0 0 8px 0; font-size:1.05rem; color:#13573f; font-family: Georgia, 'Times New Roman', serif; }
label.option { display:block; margin:8px 0; cursor:pointer; }
.result { margin-top:24px; padding:20px; background:#f1f9f5; border-radius:12px; }
.skin-card { background:#ffffff; padding:14px; border-radius:12px; margin:12px 0; box-shadow: 0 6px 12px rgba(0,0,0,0.04); opacity:0; transform: translateY(8px); }
.skin-card h4 { margin:0 0 8px 0; font-size:1.05rem; color:#0e5b3f; font-family: 'Georgia', serif; }

.skin-card p.warning { background:#fff7f6; border-left:4px solid #ff6b6b; padding:10px; border-radius:6px; }
.skin-card p.products { background:#f7fff8; border-left:4px solid #23a058; padding:10px; border-radius:6px; }

.cta-area { margin-top:18px; display:flex; flex-direction:column; gap:12px; }
.cta-grid { display:grid; grid-template-columns: 1fr; gap:12px; }
.cta-card { background: linear-gradient(180deg,#ffffff,#f7fff8); padding:14px; border-radius:12px; box-shadow: 0 8px 20px rgba(13,94,61,0.06); display:flex; align-items:center; gap:12px; border:1px solid #e6f3ec; opacity:0; transform: translateY(8px); }
.cta-card .icon { width:54px; height:54px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:#eaf6f1; flex-shrink:0; }

<body>
<div class="container">
  <header>
    <h2>🌿 پرسشنامه رایگان تشخیص نوع پوست</h2>
    <p class="intro">این پرسشنامه به صورت کاملاً رایگان توسط <strong>دکتر مریم موسویان</strong>، پزشک متخصص مراقبت پوست و مو ارائه می‌شود. تنها چند دقیقه وقت لازم است تا نوع پوست شما و نیازهای آن را مشخص کنیم.</p>
  </header>

  <section id="form-section">
    <h3>اطلاعات اولیه</h3>
    <div class="form-row">
      <label>نام: <input type="text" id="firstName"></label>
      <label>نام خانوادگی: <input type="text" id="lastName"></label>
      <label>شماره موبایل: <input type="text" id="phone"></label>
      <label>جنسیت:
        <select id="gender"><option value="مرد">مرد</option><option value="زن">زن</option></select>
      </label>
      <label>سن: <input type="number" id="age" min="1" max="120"></label>
      <button onclick="startQuiz()">شروع پرسشنامه</button>
    </div>
  </section>

  <section id="quiz-section" style="display:none;"></section>
  <section id="result-section" style="display:none;"></section>
</div>

<script>
/*
الگوریتم علمی بر اساس:
1. سیستم طبقه‌بندی سنتی Helena Rubinstein (1910) — هنوز رایج‌ترین در کلینیک
2. سیستم Baumann (2006، به‌روزرسانی 2024) — معتبرترین در درماتولوژی
3. مقاله Nature Scientific Reports 2025 — طبقه‌بندی پوست حساس
4. منابع PubMed 2024 — دهیدراتاسیون و TEWL

انواع پوست تشخیص داده‌شده:
- پوست نرمال: متعادل، سبوم و آب کافی
- پوست چرب: تولید سبوم زیاد (hyperseborrhea)
- پوست خشک (Xerosis): کمبود سبوم و ضعف سد پوستی (skin barrier dysfunction)
- پوست مختلط: چرب در ناحیه T، خشک/نرمال در گونه‌ها
- پوست حساس: پوست مستقل با واکنش‌پذیری بالا (Misery et al., 2019)
  - می‌تواند با هر نوع دیگری همراه باشد
  - زیرگروه‌ها: آکنه، روزاسه، استینگی، آلرژیک (Baumann 2024)
- دهیدراتاسیون: وضعیت کمبود آب (نه نوع پوست) — می‌تواند با هر نوعی همراه باشد
*/

const quizQuestions = [
  {
    q: 'بعد از شست‌وشوی صورت، پوستت بعد از ۳۰ دقیقه (بدون هیچ محصولی) چه حسی داره؟',
    a: [
      'خیلی کشیده، خشک و ناراحت',
      'کشیده ولی بعد از مدتی براق می‌شود — مات و بی‌روح',
      'براق و چرب در همه جای صورت',
      'پیشانی و بینی چرب، گونه‌ها خشک یا نرمال',
      'طبیعی و راحت — نه خشک نه چرب',
      'قرمزی، سوزش یا خارش دارد'
    ]
  },
  {
    q: 'در طول روز، پوستت چطور به نظر می‌رسه؟',
    a: [
      'همیشه خشک، کدر و پوسته‌پوسته',
      'مات، کدر و بی‌روح — حتی با مرطوب‌کننده',
      'براق و چرب در همه جا',
      'فقط ناحیه T (پیشانی و بینی) براق است',
      'شفاف، یکنواخت و طبیعی',
      'زود قرمز می‌شود یا تحریک می‌شود'
    ]
  },
  {
    q: 'وقتی مرطوب‌کننده سبک استفاده می‌کنی، چند ساعت بعد پوستت چطور است؟',
    a: [
      'هنوز خشک و کشیده است',
      'بهتر می‌شود ولی بعد از چند ساعت دوباره کدر و بی‌روح می‌شود',
      'خیلی چرب و سنگین می‌شود',
      'در بعضی نواحی خوب است، در بعضی سنگین',
      'مناسب و راحت — طبیعی به نظر می‌رسد',
      'احساس سوزش، خارش یا قرمزی می‌دهد'
    ]
  },
  {
    q: 'منافذ پوستت را چطور توصیف می‌کنی؟',
    a: [
      'بسیار کوچک و نامحسوس — پوستم خشک و کشیده است',
      'کوچک ولی پوستم کدر و مات به نظر می‌رسد',
      'بزرگ و واضح در همه جای صورت',
      'فقط در ناحیه بینی و پیشانی بزرگ است',
      'طبیعی و یکنواخت',
      'همراه با قرمزی یا التهاب است'
    ]
  },
  {
    q: 'پوستت در زمستان یا محیط‌های خشک (مثل محیط با بخاری یا تهویه) چطور می‌شود؟',
    a: [
      'خیلی خشک، پوسته‌پوسته و ترک می‌خورد',
      'کدرتر و بی‌روح‌تر می‌شود — احساس کم‌آبی می‌کنم',
      'چرب باقی می‌ماند',
      'بخش‌هایی خشک‌تر، بخش‌هایی چرب‌تر می‌شود',
      'تغییر چندانی ندارد',
      'حساس‌تر، قرمزتر و تحریک‌پذیرتر می‌شود'
    ]
  },
  {
    q: 'وضعیت جوش و آکنه پوستت چگونه است؟',
    a: [
      'بسیار کم یا هیچ — پوستم بیشتر خشک است',
      'گاهی جوش‌های ریز — پوستم اغلب کدر و خسته به نظر می‌رسد',
      'زیاد — مخصوصاً در نواحی چرب',
      'گاهی در ناحیه T (پیشانی، بینی، چانه)',
      'خیلی کم یا هیچ — پوستم نرمال است',
      'پوستم مدام به محصولات یا محرک‌های محیطی واکنش نشان می‌دهد'
    ]
  },
  {
    q: 'آیا پوستت به محصولات، عطرها یا تغییرات آب‌وهوایی واکنش نشان می‌دهد؟',
    a: [
      'نه — مقاوم است ولی خشک است',
      'گاهی — پوستم کدرتر یا کشیده‌تر می‌شود',
      'نه — مقاوم است',
      'گاهی فقط در ناحیه T',
      'نه — کاملاً مقاوم و نرمال است',
      'بله — خیلی راحت قرمز، سوزش یا خارش پیدا می‌کند'
    ]
  },
  {
    q: 'پوستت معمولاً چه ظاهری دارد وقتی آرایش نداری؟',
    a: [
      'کدر، خشک و بی‌روح',
      'مات و خسته — حتی با مراقبت',
      'براق و چرب',
      'در ناحیه T براق، بقیه نرمال یا خشک',
      'طبیعی، شفاف و سالم',
      'قرمز، تحریک‌شده یا ناهمگون'
    ]
  }
];

/*
امتیازدهی:
- oil: مثبت = تمایل به چربی، منفی = تمایل به خشکی
- dehy: مثبت = نشانه دهیدراتاسیون (کمبود آب - TEWL بالا)
- sens: مثبت = حساسیت (واکنش‌پذیری بالا)
*/
const contribByQuestion = [
  // سوال 1
  [
    {oil:-2.0, dehy:0.1, sens:0.1},
    {oil:-0.5, dehy:2.0, sens:0.1},
    {oil:2.0,  dehy:0.0, sens:0.1},
    {oil:0.8,  dehy:0.3, sens:0.1},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:2.0}
  ],
  // سوال 2
  [
    {oil:-1.8, dehy:0.2, sens:0.1},
    {oil:-0.3, dehy:2.0, sens:0.2},
    {oil:1.8,  dehy:0.0, sens:0.1},
    {oil:0.9,  dehy:0.2, sens:0.1},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:1.8}
  ],
  // سوال 3
  [
    {oil:-1.5, dehy:0.1, sens:0.1},
    {oil:-0.2, dehy:1.8, sens:0.2},
    {oil:1.5,  dehy:0.0, sens:0.1},
    {oil:0.5,  dehy:0.3, sens:0.3},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:2.0}
  ],
  // سوال 4
  [
    {oil:-1.2, dehy:0.0, sens:0.0},
    {oil:-0.2, dehy:1.5, sens:0.1},
    {oil:1.8,  dehy:0.0, sens:0.0},
    {oil:0.8,  dehy:0.1, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:1.5}
  ],
  // سوال 5
  [
    {oil:-2.0, dehy:0.5, sens:0.2},
    {oil:-0.3, dehy:2.0, sens:0.2},
    {oil:1.2,  dehy:0.0, sens:0.0},
    {oil:0.8,  dehy:0.3, sens:0.1},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.2, sens:2.0}
  ],
  // سوال 6
  [
    {oil:-1.5, dehy:0.0, sens:0.0},
    {oil:-0.1, dehy:1.5, sens:0.2},
    {oil:2.0,  dehy:0.0, sens:0.3},
    {oil:0.8,  dehy:0.1, sens:0.1},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.1, sens:1.8}
  ],
  // سوال 7
  [
    {oil:-1.0, dehy:0.0, sens:0.0},
    {oil:-0.2, dehy:1.5, sens:0.1},
    {oil:1.0,  dehy:0.0, sens:0.0},
    {oil:0.5,  dehy:0.1, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:2.5}
  ],
  // سوال 8
  [
    {oil:-1.2, dehy:0.2, sens:0.0},
    {oil:-0.1, dehy:1.2, sens:0.2},
    {oil:1.2,  dehy:0.0, sens:0.0},
    {oil:0.6,  dehy:0.1, sens:0.1},
    {oil:0.0,  dehy:0.0, sens:0.0},
    {oil:0.0,  dehy:0.0, sens:2.0}
  ]
];

let userAnswers = [];
let currentQuestion = 0;

function startQuiz(){
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const age = document.getElementById('age').value;
  if(!firstName||!lastName||!phone||!age){ alert('لطفا همه اطلاعات را وارد کنید'); return; }
  document.getElementById('form-section').style.display='none';
  showQuestion();
}

function showQuestion(){
  if(currentQuestion>=quizQuestions.length){ showResult(); return; }
  const q = quizQuestions[currentQuestion];
  let html = `<div class="question"><h3>سوال ${currentQuestion+1}: ${q.q}</h3>`;
  q.a.forEach((ans,i)=>{ html += `<label class='option'><input type='radio' name='q${currentQuestion}' value='${i}'> ${ans}</label>`; });
  html += `<div style="margin-top:10px;"><button onclick='nextQuestion()'>بعدی</button></div></div>`;
  document.getElementById('quiz-section').innerHTML = html;
  document.getElementById('quiz-section').style.display='block';
}

function nextQuestion(){
  const radios = document.getElementsByName('q'+currentQuestion);
  let selected = null;
  radios.forEach(r=>{ if(r.checked) selected = parseInt(r.value); });
  if(selected===null){ alert('لطفا یک گزینه انتخاب کنید'); return; }
  userAnswers.push(selected);
  currentQuestion++;
  showQuestion();
}

function showResult(){
  document.getElementById('quiz-section').style.display='none';
  if(userAnswers.length === 0){ alert('اطلاعاتی برای محاسبه وجود ندارد.'); return; }

  let oilScore = 0, dehyScore = 0, sensScore = 0;
  userAnswers.forEach((ansIdx, qi) => {
    const c = contribByQuestion[qi][ansIdx] || {oil:0,dehy:0,sens:0};
    oilScore += c.oil;
    dehyScore += c.dehy;
    sensScore += c.sens;
  });

  // تعیین نوع پوست پایه
  // پوست حساس: اگر sensScore خیلی بالا باشه و oil نه چرب نه خشک باشه = پوست حساس مستقل
  let baseType;
  const isSensitiveDominant = sensScore >= 6.0 && Math.abs(oilScore) < 2.0;

  if(isSensitiveDominant) {
    baseType = 'حساس';
  } else if(oilScore >= 3.5) {
    baseType = 'چرب';
  } else if(oilScore >= 1.0) {
    baseType = 'مختلط';
  } else if(oilScore >= -1.0) {
    baseType = 'نرمال';
  } else {
    baseType = 'خشک';
  }

  // دهیدراتاسیون مستقل از نوع پوست
  const isDehydrated = dehyScore >= 3.5;
  // حساسیت همراه با نوع پوست دیگر
  const isSensitiveCombo = sensScore >= 3.0 && !isSensitiveDominant;

  const baseTexts = {
    'چرب': {
      title: '✨ پوست چرب',
      desc: 'پوست شما غدد سباسه فعال‌تری دارد و سبوم بیشتری تولید می‌کند. این نوع پوست مستعد انسداد منافذ، کومدون (جوش سر سیاه و سر سفید) و آکنه است. مزیت آن تأخیر در ظهور چین و چروک در مقایسه با پوست خشک است.',
      warn: 'هشدار: شستشوی بیش از حد یا استفاده از محصولات قوی، پوست را تحریک می‌کند و غدد سباسه چربی بیشتری تولید می‌کنند. از محصولات الکل‌دار، شوینده‌های حاوی SLS و محصولات بیش از حد چرب پرهیز کنید.',
      products: 'محصولات مناسب: شوینده ژلی یا فومی ملایم، تونر بدون الکل، مرطوب‌کننده oil-free و non-comedogenic، ضد آفتاب با فرمول ژلی یا آبی.'
    },
    'خشک': {
      title: '🌸 پوست خشک',
      desc: 'پوست شما به دلیل کمبود سبوم (چربی طبیعی)، سد پوستی (skin barrier) ضعیف‌تری دارد و رطوبت را نگه نمی‌دارد. این با دهیدراتاسیون فرق دارد — مشکل اصلی شما کمبود لیپیدهای پوستی است که باعث TEWL بالا (تبخیر آب از پوست) می‌شود.',
      warn: 'هشدار: از شوینده‌های قوی، محصولات حاوی الکل، رتینول با غلظت بالا و اگزفولیاسیون مکرر پرهیز کنید. این‌ها سد پوستی را بیشتر تضعیف می‌کنند.',
      products: 'محصولات مناسب: شوینده کرمی یا روغنی ملایم، سرم آبرسان (هیالورونیک اسید)، مرطوب‌کننده غنی حاوی سرامید، روغن‌های طبیعی، ضد آفتاب مرطوب‌کننده.'
    },
    'مختلط': {
      title: '🌺 پوست مختلط',
      desc: 'پوست شما در ناحیه T (پیشانی، بینی، چانه) به دلیل تراکم بیشتر غدد سباسه چرب، و در گونه‌ها خشک یا نرمال است. این شایع‌ترین نوع پوست در جهان است.',
      warn: 'هشدار: استفاده از یک محصول برای کل صورت ممکن است گونه‌ها را خشک‌تر یا ناحیه T را چرب‌تر کند. ایده‌آل این است که مراقبت در دو ناحیه متفاوت انجام شود.',
      products: 'محصولات مناسب: شوینده متعادل‌کننده، مرطوب‌کننده سبک برای ناحیه T، مرطوب‌کننده غنی‌تر برای گونه‌ها، ضد آفتاب سبک.'
    },
    'نرمال': {
      title: '🌿 پوست نرمال',
